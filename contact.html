<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Victory Omoregie</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .contact-container {
            max-width: 600px;
            margin: 3rem auto;
            padding: 2rem;
            background-color: #1a1a1a;
            border-radius: 8px;
            border-right: 4px solid #ff4a8d;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #a0a0a0;
        }
        .form-control {
            width: 100%;
            padding: 0.8rem;
            background-color: #121212;
            border: 1px solid #2a2a2a;
            color: #ffffff;
            border-radius: 4px;
        }
        .form-control:focus {
            border-color: #ff4a8d;
            outline: none;
        }
        .error-message {
            color: #c62828;
            font-size: 0.85rem;
            margin-top: 0.3rem;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">Victory<span>.O</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="planner.html">Academic Planner</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="contact-container">
            <h2 style="margin-bottom: 1.5rem;">Get In <span>Touch</span></h2>
            
            <form id="contactForm" novalidate>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control">
                    <div id="nameError" class="error-message">Name cannot be empty.</div>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control">
                    <div id="emailError" class="error-message">Please enter a valid email address.</div>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" class="form-control">
                    <div id="phoneError" class="error-message">Phone number must contain only digits.</div>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" class="form-control"></textarea>
                    <div id="messageError" class="error-message">Message field cannot be empty.</div>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Submit Message</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; Copyright 2026 VICTORY'S MIVA CREATION All Rights Reserved</p>
    </footer>

    <script src="js/validation.js"></script>
</body>
</html>
