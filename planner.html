<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Planner | Victory Omoregie</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .planner-container {
            max-width: 700px;
            margin: 3rem auto;
            padding: 2rem;
            background-color: #1a1a1a;
            border-radius: 8px;
            border-top: 4px solid #ff4a8d;
        }
        .planner-form {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .input-field {
            flex: 1;
            padding: 0.8rem;
            background-color: #121212;
            border: 1px solid #2a2a2a;
            color: #ffffff;
            border-radius: 4px;
        }
        .input-field:focus {
            border-color: #ff4a8d;
            outline: none;
        }
        .task-list {
            list-style: none;
        }
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background-color: #121212;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            margin-bottom: 0.8rem;
            transition: all 0.3s ease;
        }
        .task-item.completed span {
            text-decoration: line-through;
            color: #a0a0a0;
        }
        .task-actions {
            display: flex;
            gap: 0.5rem;
        }
        .btn-action {
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-complete { background-color: #2e7d32; color: white; }
        .btn-delete { background-color: #c62828; color: white; }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">Victory<span>.O</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="planner.html" class="active">Academic Planner</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="planner-container">
            <h2 style="margin-bottom: 0.5rem;">Academic <span>Planner</span></h2>
            <p style="color: #a0a0a0; margin-bottom: 1.5rem;">Manage tasks, assignments, and backend development milestones dynamically.</p>
            
            <div class="planner-form">
                <input type="text" id="taskInput" class="input-field" placeholder="Enter a new academic task...">
                <button id="addTaskBtn" class="btn-primary" style="padding: 0.8rem 1.5rem;">Add Task</button>
            </div>

            <ul id="taskList" class="task-list">
                <!-- JavaScript will inject tasks here dynamically -->
            </ul>
        </div>
    </main>

    <footer>
        <p>&copy; Copyright 2026 VICTORY'S MIVA CREATION All Rights Reserved</p>
    </footer>

    <script src="js/planner.js"></script>
</body>
</html>
